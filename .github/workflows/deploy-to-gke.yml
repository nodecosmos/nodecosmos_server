name: Build, Migrate, and Deploy to GKE via Helm

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: nodecosmos-cloud
  GKE_CLUSTER: nodecosmos-us-central1
  GKE_ZONE: us-central1
  ARTIFACT_REGISTRY_LOCATION: us-central1
  ARTIFACT_REGISTRY_REPOSITORY: nodecosmos-registry/nodecosmos_server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: nodecosmos-cloud
          workload_identity_provider: 'projects/534114130521/locations/global/workloadIdentityPools/github-oidc-provider/providers/github-issuer-provider'

      - name: Get Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: nodecosmos-us-central1
          location: us-central1

      - name: Install Helm
        run: |
          curl -fsSL -o helm.tar.gz https://get.helm.sh/helm-v3.17.1-linux-amd64.tar.gz
          tar -zxvf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          helm version #Verify the installation

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev --verbosity=debug

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/kubernetes/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}:latest
          cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}:latest

      - name: Decode SSL Certificate
        run: echo "${{ secrets.DB_CLIENT_CERT }}" | > client.crt

      - name: Decode SSL Key
        run: echo "${{ secrets.DB_CLIENT_KEY }}" | > client.key

      - name: Decode CA Certificate
        run: echo "${{ secrets.DB_CA_CERT }}" | > ca.crt

      - name: Run migrations
        run: |
          migrate --keyspace nodecosmos --host ${{ secrets.SCYLLA_URL }} --drop-and-replace --ca ca.crt --cert client.crt --key client.key

      - name: Checkout Helm Charts Repo
        uses: actions/checkout@v4
        with:
          repository: nodecosmos/kubernetes
          path: kubernetes

      - name: Deploy with Helm
        run: |
          helm upgrade nodecosmos kubernetes/nodecosmos \
            --install \
            --values kubernetes/google-cloud/nodecosmos/nodecosmos-values.yaml \
            --set image.repository=${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }} \
            --set image.tag=${{ github.sha }} \
            --wait
            -n nodecosmos
