name: Build and Deploy Rust Application to EC2
on:
  push:
    branches:
      - main
env:
  BUCKET_NAME: aws-nodecosmos-bucket
  AWS_REGION: us-east-1
  CARGO_TERM_COLOR: always
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    container:
      image: nodecosmos/aarch64_env:latest
    env:
      PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::714215625955:role/github-actions
          role-session-name: s3session
          aws-region: ${{ env.AWS_REGION }}
      - name: Debug environment
        run: |
          env
          echo "PATH: $PATH"
          /root/.cargo/bin/rustup show
          /root/.cargo/bin/rustc --version
          /root/.cargo/bin/cargo --version
          aws --version
      - name: Cache dependencies
        uses: actions/cache@v2
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build for aarch64
        run: |
          export RUSTFLAGS="-C linker=aarch64-linux-gnu-gcc"
          cargo build --release --target aarch64-unknown-linux-gnu --verbose
      - name: Zip the binary appspec.yml and scripts
        run: |
          zip -j nodecosmos.zip target/aarch64-unknown-linux-gnu/release/nodecosmos
          zip -r nodecosmos.zip appspec.yml scripts
      - name: Upload to S3
        run: |
          aws s3 cp nodecosmos.zip s3://$BUCKET_NAME/nodecosmos.zip
      - name: Deploy to EC2
        run: |
          deployment_output=$(aws deploy create-deployment \
          --application-name Nodecosmos \
          --s3-location bucket=$BUCKET_NAME,key=nodecosmos.zip,bundleType=zip \
          --deployment-group-name nodecosmos-deployment-group \
          --deployment-config-name CodeDeployDefault.OneAtATime \
          --description "Deploying nodecosmos" \
          --query 'deploymentId' \
          --output text)
          echo "::set-output name=deployment_id::$deployment_output"
      - name: Validate Deployment
        id: check_deployment
        run: |
          deployment_id=${{ steps.deploy.outputs.deployment_id }}
          initial_delay_seconds=4  # Set an initial delay as needed
          max_checks=3
          count=0

          echo "Waiting $initial_delay_seconds seconds for initial deployment processes to start..."
          sleep $initial_delay_seconds  # Wait before the first check

          while [[ $count -lt $max_checks ]]; do
            echo "Fetching deployment details for deployment ID: $deployment_id"
            aws deploy get-deployment --deployment-id $deployment_id > deployment_details.json
          
            # Parse the JSON output to find the status of ValidateService event
            validate_service_status=$(jq -r '.deploymentInfo.deploymentOverview.ValidateService' deployment_details.json)
          
            echo "Attempt $(($count + 1)) - ValidateService status: $validate_service_status"
          
            if [[ $validate_service_status == "Succeeded" ]]; then
              echo "Deployment and ValidateService succeeded."
              break
            elif [[ $validate_service_status == "Failed" ]]; then
              echo "ValidateService failed."
              exit 1
            elif [[ $count -eq $(($max_checks - 1)) ]]; then
              echo "Maximum checks reached without ValidateService success."
              exit 1
            fi
          
            sleep 15  # Interval between subsequent checks
            ((count++))
          done
