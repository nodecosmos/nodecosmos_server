name: Build and Deploy Rust Application to EC2

on:
  push:
    branches:
      - main

env:
  BUCKET_NAME: aws-nodecosmos-bucket
  AWS_REGION: us-east-1
  CARGO_TERM_COLOR: always
  OPENSSL_VERSION: openssl-3.1.1
  OPENSSL_INSTALL_DIR: ${{ github.workspace }}/openssl-aarch64
  ENV: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    container:
      image: nodecosmos/aarch64_env:latest
    env:
      PATH: /root/.cargo/bin:$PATH
    steps:
      - name: Check Rust version
        run: rustc --version
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::714215625955:role/github-actions
          role-session-name: s3session
          aws-region: ${{ env.AWS_REGION }}
      - name: Cache dependencies
        uses: actions/cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/aarch64-unknown-linux-gnu
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build for aarch64
        run: |
          export RUSTFLAGS="-C linker=aarch64-linux-gnu-gcc"
          cargo build --release --target aarch64-unknown-linux-gnu --verbose
      - name: Zip the binary appspec.yml and scripts
        run: |
          zip -j nodecosmos.zip target/aarch64-unknown-linux-gnu/release/nodecosmos
          zip -r nodecosmos.zip appspec.yml scripts
      - name: Upload to S3
        run: |
          aws s3 cp nodecosmos.zip s3://$BUCKET_NAME/nodecosmos.zip
      - name: Deploy to EC2
        run: |
          deployment_output=$(aws deploy create-deployment \
          --application-name Nodecosmos \
          --s3-location bucket=$BUCKET_NAME,key=nodecosmos.zip,bundleType=zip \
          --deployment-group-name nodecosmos-deployment-group \
          --deployment-config-name CodeDeployDefault.OneAtATime \
          --description "Deploying nodecosmos" \
          --query 'deploymentId' \
          --output text)
          echo "::set-output name=deployment_id::$deployment_output"
      - name: Check deployment status
        run: |
          deployment_id=${{ steps.deploy.outputs.deployment_id }}
          max_checks=3
          count=0
          while [[ $count -lt $max_checks ]]; do
            status=$(aws deploy get-deployment \
                  --deployment-id $deployment_id \
                  --query "deploymentInfo.status" \
                  --output text)
            echo "Attempt $(($count + 1)) - Deployment status: $status"
            if [[ $status == "Succeeded" ]]; then
              echo "Deployment succeeded."
              break
            elif [[ $status == "Failed" ]]; then
              echo "Deployment failed."
              exit 1
            elif [[ $count -eq $(($max_checks - 1)) ]]; then
              echo "Maximum checks reached without success."
              exit 1
            fi
            sleep 15
            ((count++))
          done
